<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Transactions</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list>
    <ion-item *ngFor="let txn of (transactions$ | async)" lines="full">
      <ion-label>
        <h2>{{ txn.description }}</h2>
        <p>{{ txn.category }} • {{ txn.type }}</p>
        <p>{{ txn.date | date:'mediumDate' }}</p>
      </ion-label>
      <ion-note slot="end" [color]="txn.type === 'Income' ? 'success' : 'danger'">
        {{ txn.type === 'Income' ? '+' : '-' }}{{ txn.amount | number:'1.2-2' }}
      </ion-note>
      <ion-button slot="end" fill="clear" color="danger" (click)="deleteTxn(txn.id!)">
        <ion-icon name="trash-outline"></ion-icon>
      </ion-button>
    </ion-item>
  </ion-list>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="openAddModal()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>

  <!-- Add Modal -->
  <ion-modal [isOpen]="isModalOpen" (didDismiss)="isModalOpen = false">
  <ng-template>
    <ion-header class="ion-no-border">
      <ion-toolbar>
        <ion-title>New Transaction</ion-title>
        <ion-buttons slot="end">
          <ion-button (click)="isModalOpen = false">Cancel</ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>

    <ion-content class="ion-padding">
      <ion-item lines="none">
        <ion-select [(ngModel)]="newTxn.type" label="Transaction Type" label-placement="stacked">
          <ion-select-option value="Income">Income</ion-select-option>
          <ion-select-option value="Expense">Expense</ion-select-option>
        </ion-select>
      </ion-item>

      <ion-item lines="none">
        <ion-input type="number" [(ngModel)]="newTxn.amount" label="Amount" label-placement="stacked" placeholder="0.00"></ion-input>
      </ion-item>

      <ion-item lines="none">
        <ion-label position="stacked">Date</ion-label>
        <ion-datetime presentation="date" [(ngModel)]="newTxn.dateStr" size="cover"></ion-datetime>
      </ion-item>

      <ion-item lines="none">
        <ion-select [(ngModel)]="newTxn.category" label="Category" label-placement="stacked">
          <ion-select-option value="Sales">Sales</ion-select-option>
          <ion-select-option value="Marketing">Marketing</ion-select-option>
          <ion-select-option value="Salary">Salary</ion-select-option>
          <ion-select-option value="Utility">Utility</ion-select-option>
          <ion-select-option value="Logistic">Logistic</ion-select-option>
          <ion-select-option value="Purchase">Purchase</ion-select-option>
        </ion-select>
      </ion-item>

      <ion-item lines="none">
        <ion-textarea [(ngModel)]="newTxn.description" label="Description" label-placement="stacked" placeholder="What was this for?"></ion-textarea>
      </ion-item>

      <ion-button expand="block" (click)="addTransaction()" class="add-btn ion-margin-top">
        <ion-icon name="checkmark-circle-outline" slot="start"></ion-icon>
        Save Transaction
      </ion-button>
    </ion-content>
  </ng-template>
</ion-modal>
</ion-content>
