<ion-header class="ion-no-border">
  <ion-toolbar>
    <div class="header-content">
      <p class="header-eyebrow">Export</p>
      <h1 class="header-title">Reports</h1>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="report-container">

    <p class="section-hint">Select a date range to generate your Excel report.</p>

    <!-- Date pickers -->
    <div class="date-grid">
      <div class="date-block">
        <p class="date-label">From</p>
        <div class="date-card">
          <ion-datetime
            presentation="date"
            [(ngModel)]="startDate"
            size="cover">
          </ion-datetime>
        </div>
      </div>

      <div class="date-block">
        <p class="date-label">To</p>
        <div class="date-card">
          <ion-datetime
            presentation="date"
            [(ngModel)]="endDate"
            size="cover">
          </ion-datetime>
        </div>
      </div>
    </div>

    <!-- Export button -->
    <ion-button
      expand="block"
      (click)="exportToExcel()"
      [disabled]="!startDate || !endDate"
      class="export-btn">
      <ion-icon name="download-outline" slot="start"></ion-icon>
      Generate Excel Report
    </ion-button>

    <!-- Status message -->
    <div class="status-card" *ngIf="message" [class.success]="messageColor === 'success'" [class.danger]="messageColor === 'danger'">
      <p class="status-text">{{ message }}</p>
    </div>

  </div>
</ion-content>
